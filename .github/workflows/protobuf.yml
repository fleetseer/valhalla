name: release protobuf generated code

on:
  push:
    tags: ["*"]

permissions:
  contents: read
 
defaults:
  run:
    working-directory: proto
 
jobs:
  release-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for trusted publishing to PyPI
    environment: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true
          fetch-tags: true  # versioning schema needs tags
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install build && python -m build python
      - uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d
        with:
          packages-dir: proto/python/dist/
          # uncomment when testing!
          # repository-url: https://test.pypi.org/legacy/
 
  release-ts:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true
          fetch-tags: true  # versioning schema needs tags
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: make release-ts-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
 
