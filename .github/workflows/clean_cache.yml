name: Clear S3 cache (master on workflow_dispatch)

on:
  workflow_dispatch:
    inputs:
      clear_all:
        type: boolean
        description: "Clear all master ccaches (defaults to only debug build)"
        required: false
        default: false
  schedule:
    # every first of the month
    - cron: "0 0 1,15 * *"

permissions:
  contents: read

jobs:
  clear_ccache:
    name: Clear ccache on branch
    runs-on: ubuntu-latest
    steps:
      - name: Install and setup mc client
        run: |
          wget https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc --help
          ./mc alias set hetzner https://fsn1.your-objectstorage.com ${{ secrets.HETZNER_S3_ACCESS_KEY }} ${{ secrets.HETZNER_S3_ACCESS_SECRET }}

      - name: Delete master caches
        run: |
          set -euo pipefail
          # get branch
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            branch="master"
          else
            branch="${{ github.ref_name }}"
          fi
          ./mc find hetzner/gha-cache-2 --path "ccache-debug-linux-x86_64-${branch}*" --exec "./mc rm --force {}"
          # the others hardly accumulate, can be done manually every now and then
          if [[ "${{ github.event.inputs.clear_all }}" == "true" ]]; then
            ./mc find hetzner/gha-cache-2 --path "ccache-release-linux-x86_64-${branch}*" --exec "./mc rm --force {}"
            ./mc find hetzner/gha-cache-2 --path "ccache-release-linux-aarch64-${branch}*" --exec "./mc rm --force {}"
            ./mc find hetzner/gha-cache-2 --path "ccache-osx-${branch}*" --exec "./mc rm --force {}"
          fi
